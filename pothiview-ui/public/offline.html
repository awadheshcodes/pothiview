<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#7BA05B" />
  <title>You're offline — PothiView</title>
  <style>
    :root {
      color-scheme: light;
    }
    * { box-sizing: border-box; }
    html, body {
      height: 100%;
      margin: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, Helvetica, Arial, sans-serif;
      background: #F2EDE2;
      color: #221E18;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      min-height: 100vh;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: #FBF8F2;
      border-radius: 20px;
      padding: 40px 32px 32px;
      text-align: center;
      box-shadow: 0 1px 2px rgba(34,30,24,0.04), 0 20px 50px -20px rgba(34,30,24,0.18);
      border: 1px solid rgba(34,30,24,0.06);
    }
    .icon-wrap {
      width: 76px;
      height: 76px;
      margin: 0 auto 22px;
      border-radius: 20px;
      background: #2F7A60;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 24px -10px rgba(47,122,96,0.55);
    }
    .pulse {
      position: relative;
    }
    .pulse::before {
      content: "";
      position: absolute;
      inset: -10px;
      border-radius: 26px;
      border: 1.5px solid rgba(47,122,96,0.35);
      animation: pulse 2.4s ease-out infinite;
    }
    @keyframes pulse {
      0%   { transform: scale(0.85); opacity: 0.8; }
      75%  { transform: scale(1.25); opacity: 0; }
      100% { transform: scale(1.25); opacity: 0; }
    }
    h1 {
      font-size: 21px;
      font-weight: 700;
      margin: 0 0 10px;
      letter-spacing: -0.01em;
    }
    p {
      font-size: 14.5px;
      line-height: 1.6;
      color: #6E6657;
      margin: 0 0 26px;
    }
    .pdf-note {
      display: flex;
      align-items: center;
      gap: 10px;
      text-align: left;
      background: #EFF6F2;
      border: 1px solid #D9EBE2;
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 24px;
      font-size: 13px;
      color: #1C4E3E;
      line-height: 1.5;
    }
    .pdf-note svg { flex-shrink: 0; }
    button {
      appearance: none;
      border: none;
      cursor: pointer;
      background: #2F7A60;
      color: #FBF8F2;
      font-size: 14px;
      font-weight: 600;
      padding: 11px 22px;
      border-radius: 10px;
      transition: background 0.15s ease, transform 0.1s ease;
    }
    button:hover { background: #23624D; }
    button:active { transform: scale(0.97); }
    button.secondary {
      background: transparent;
      color: #2F7A60;
      border: 1.5px solid #C9DED4;
    }
    button.secondary:hover { background: #EFF6F2; }
    .actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .hint {
      margin-top: 16px;
      font-size: 12px;
      color: #A39C8C;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrap pulse">
      <!-- wifi-off glyph -->
      <svg width="34" height="34" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M3 3L21 21" stroke="#FBF8F2" stroke-width="2" stroke-linecap="round"/>
        <path d="M5 8.5C7.1 6.9 9.5 6 12 6C14.5 6 16.9 6.9 19 8.5" stroke="#FBF8F2" stroke-width="2" stroke-linecap="round" stroke-opacity="0.55"/>
        <path d="M2 5C5 2.6 8.4 1.3 12 1.3" stroke="#FBF8F2" stroke-width="0" stroke-linecap="round"/>
        <path d="M8 12.3C9.2 11.4 10.6 10.9 12 10.9C13.4 10.9 14.8 11.4 16 12.3" stroke="#FBF8F2" stroke-width="2" stroke-linecap="round"/>
        <path d="M9.9 16C10.5 15.6 11.2 15.4 12 15.4C12.8 15.4 13.5 15.6 14.1 16" stroke="#FBF8F2" stroke-width="2" stroke-linecap="round" stroke-opacity="0.55"/>
        <circle cx="12" cy="19.3" r="1.15" fill="#FBF8F2"/>
      </svg>
    </div>

    <h1>You're offline</h1>
    <p>Check your connection and try again. PothiView will reconnect automatically once you're back online.</p>

    <div class="pdf-note">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M6 2.5h8l4 4V20a1.5 1.5 0 0 1-1.5 1.5h-11A1.5 1.5 0 0 1 4 20V4A1.5 1.5 0 0 1 6 2.5Z" stroke="#2F7A60" stroke-width="1.5"/>
        <path d="M14 2.5V7h4" stroke="#2F7A60" stroke-width="1.5"/>
      </svg>
      <span>Previously opened PDFs are still available — open one from your Library.</span>
    </div>

    <div class="actions">
      <button class="secondary" onclick="window.location.href='/library'">Open Library</button>
      <button onclick="window.location.reload()">Retry</button>
    </div>
    <div class="hint">PothiView</div>
  </div>
</body>
</html>
